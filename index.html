<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimo 每日信号追踪 — 2026-05-06</title>
  <style>
:root {
  --bg: #0b1120;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --border: #1e3a5f;
  --text: #cbd5e1;
  --text-muted: #64748b;
  --text-heading: #f1f5f9;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --red: #ef4444;
  --green: #22c55e;
  --amber: #f59e0b;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
.container { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }

/* Header */
header { padding: 8px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
header h1 { font-size: 1.5rem; color: var(--text-heading); display: flex; align-items: center; gap: 8px; }
header .sub { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
header .meta-row { display: flex; gap: 16px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
.date-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-size: 0.8rem; color: var(--text-muted); }

/* Navigation */
nav { margin-bottom: 20px; display: flex; gap: 6px; flex-wrap: wrap; }
nav a { color: var(--accent); text-decoration: none; font-size: 0.8rem; padding: 3px 10px; border-radius: 4px; transition: background .15s; }
nav a:hover { background: rgba(56,189,248,0.1); }
nav a.active { background: rgba(56,189,248,0.15); color: #7dd3fc; }

/* Cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.card-header h2 { font-size: 1.1rem; color: var(--text-heading); margin: 0; }
.card-header .badge-group { display: flex; gap: 6px; flex-wrap: wrap; }
.card-header .stats { font-size: 0.8rem; color: var(--text-muted); }

/* Section headings (from markdown) */
.section-heading { color: var(--text-heading); margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); font-size: 1.05rem; }
.sub-heading { color: var(--text-heading); margin: 16px 0 8px; font-size: 0.95rem; }
.h2 { color: var(--accent); border-color: rgba(56,189,248,0.2); }
.h3 { margin: 20px 0 8px; }
.h4 { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }

/* Tables */
.table-wrap { overflow-x: auto; margin: 12px 0; border: 1px solid var(--border); border-radius: 6px; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { text-align: left; color: var(--text-muted); font-weight: 600; padding: 8px 10px; background: rgba(30,58,95,0.3); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid rgba(30,58,95,0.3); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(56,189,248,0.03); }

/* Paragraphs & text */
p { margin: 6px 0; font-size: 0.88rem; }
p.subtitle-p { font-weight: 600; color: var(--text-heading); font-size: 0.92rem; margin: 12px 0 6px; }
blockquote { border-left: 3px solid var(--accent2); padding: 8px 14px; margin: 10px 0; background: rgba(129,140,248,0.05); border-radius: 0 6px 6px 0; font-size: 0.85rem; color: #a5b4fc; }
blockquote strong { color: #c7d2fe; }
ul { margin: 8px 0 8px 20px; font-size: 0.87rem; }
li { margin: 3px 0; }
code { background: rgba(56,189,248,0.1); color: #7dd3fc; padding: 1px 5px; border-radius: 3px; font-size: 0.82em; }
pre { background: #0a1628; border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; overflow-x: auto; margin: 10px 0; font-size: 0.8rem; line-height: 1.5; }
pre code { background: none; padding: 0; color: var(--text); }
hr.section-divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* Chain blocks */
.chain-block { background: rgba(56,189,248,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; margin: 12px 0; }
.chain-step { padding: 4px 0; font-size: 0.84rem; position: relative; padding-left: 20px; }
.chain-step::before { content: '↓'; color: var(--accent); position: absolute; left: 4px; top: 4px; font-size: 0.7rem; }
.chain-step:first-child::before { content: '▶'; color: var(--accent2); font-size: 0.6rem; }
.chain-step strong { color: var(--text-heading); }
.chain-step code { font-size: 0.78em; }

/* Cards from Analyst signal sections */
.signal-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 16px 0; }
.signal-block:hover { border-color: rgba(56,189,248,0.2); }
.signal-block .section-heading { border-bottom-color: rgba(56,189,248,0.15); margin-top: 0; }

/* Badges */
.badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; display: inline-flex; align-items: center; gap: 3px; }
.badge-alert { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-warn { background: rgba(245,158,11,0.15); color: #fbbf24; }
.badge-info { background: rgba(56,189,248,0.15); color: #7dd3fc; }
.badge-ok { background: rgba(34,197,94,0.15); color: #4ade80; }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@media(max-width:700px){ .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* Data highlights */
.pct-up { color: var(--red); font-weight: 600; }
.pct-down { color: var(--green); font-weight: 600; }
.vol-high { color: var(--amber); }

/* Confidence & time indicators */
.conf, .time-badge { font-size: 1rem; }
.spice { margin-right: 1px; }
.fire { font-size: 0.9rem; }

/* Critical row */
tr.critical-row td { background: rgba(239,68,68,0.05); }
tr.critical-row td:first-child { border-left: 2px solid var(--red); }

/* TOC */
.toc { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
.toc a { font-size: 0.78rem; color: var(--accent); text-decoration: none; padding: 2px 8px; border-radius: 3px; }
.toc a:hover { background: rgba(56,189,248,0.1); }

/* Footer */
.footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; }
.footer p { font-size: 0.75rem; color: var(--text-muted); }
.footer a { color: var(--accent); opacity: 0.7; }
.footer a:hover { opacity: 1; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.summary-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; }
.summary-item .value { font-size: 1.4rem; font-weight: 700; color: var(--text-heading); }
.summary-item .label { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
.summary-item.alert { border-color: var(--red); }
.summary-item.alert .value { color: var(--red); }

/* Print / dark mode handled by vars */
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🦉 Mimo 每日信号追踪</h1>
    <div class="sub">两条需求链：国产替代 / AI算力 | 池子+逻辑+归因</div>
    <div class="meta-row">
      <span class="date-tag">📅 2026-05-06</span>
      <span class="date-tag">🇨🇳 CST</span>
      <span class="date-tag">池子: 150只</span>
    </div>
  </header>
  
  <div class="toc">{toc}</div>
  <nav>{nav}</nav>

  {pool_html}
  {scanner_html}
  {analyst_html}
  {footer}
</div>
</body>
</html>
