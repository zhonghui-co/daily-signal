<title>Mimo 日报目录</title>
<style>
:root {
  --bg: #0b1120; --bg-card: #111827; --border: #1e3a5f;
  --text: #cbd5e1; --text-muted: #64748b; --text-heading: #f1f5f9;
  --accent: #38bdf8; --accent2: #818cf8; --green: #22c55e; --red: #ef4444;
  --amber: #f59e0b; --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55; font-size: 0.9rem; }
.top-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: var(--bg-card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.top-header .brand { font-size: 1.1rem; font-weight: 700; color: var(--text-heading); }
.top-nav { display: flex; gap: 2px; }
.top-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; padding: 6px 14px; border-radius: 4px; transition: all .15s; font-weight: 500; }
.top-nav a:hover { color: var(--accent); background: rgba(56,189,248,0.08); }
.top-nav a.active { color: var(--accent); background: rgba(56,189,248,0.12); }
.container { max-width: 900px; margin: 0 auto; padding: 24px 20px 36px; }
h1 { font-size: 1.3rem; color: var(--text-heading); margin-bottom: 8px; }
.sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 24px; }
.day-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.day-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-decoration: none; color: var(--text); transition: border-color .2s; }
.day-item:hover { border-color: var(--accent); }
.day-item .date { font-size: 0.9rem; font-weight: 600; color: var(--accent); }
.day-item .label { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
.day-item.today { border-color: var(--accent); background: rgba(56,189,248,0.05); }
.day-item.today .date::after { content: " 今日"; font-size: 0.62rem; color: var(--accent); }
footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.72rem; border-top: 1px solid var(--border); margin-top: 36px; }
footer a { color: var(--accent); }
</style>
