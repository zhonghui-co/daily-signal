<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦉 Mimo 投研仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
a{color:#58a6ff;text-decoration:none}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid #30363d;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;color:#58a6ff}
.header-meta{font-size:11px;color:#8b949e;display:flex;align-items:center;gap:10px}
.health{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px}
.h-ok{background:rgba(35,134,54,.15);color:#3fb950}
.h-warn{background:rgba(210,153,34,.15);color:#d29922}
.h-err{background:rgba(218,54,51,.15);color:#f85149}

.nav-tabs{display:flex;gap:0;background:#161b22;border-bottom:1px solid #30363d;padding:0 12px;overflow-x:auto}
.nav-tab{padding:10px 16px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.nav-tab:hover{color:#c9d1d9}
.nav-tab.active{color:#58a6ff;border-bottom-color:#58a6ff;font-weight:600}

.tab-content{display:none;padding:14px}
.tab-content.active{display:block}

.card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px}
.card-sub{font-size:10px;color:#8b949e;font-weight:400}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:10px;text-align:center}
.kpi-val{font-size:20px;font-weight:700}
.kpi-label{font-size:10px;color:#8b949e;margin-top:2px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

.empty{color:#484f58;font-size:12px;padding:16px;text-align:center}
.loading{color:#8b949e;font-size:12px;padding:16px;text-align:center}
.mono{font-family:monospace;font-size:11px}
.red{color:#f85149}.green{color:#3fb950}.gold{color:#d29922}.blue{color:#58a6ff}

/* Signal row */
.sig-row{display:flex;align-items:center;padding:5px 10px;border-radius:4px;gap:8px;font-size:12px;cursor:pointer;margin:2px 0}
.sig-row:hover{background:rgba(88,166,255,.04)}
.sig-fire{background:rgba(218,54,51,.08);border-left:3px solid #da3633}
.sig-high{background:rgba(210,153,34,.06);border-left:3px solid #d29922}
.sig-norm{background:rgba(31,111,235,.04);border-left:3px solid #1f6feb}
.sig-badge{font-size:10px;padding:1px 5px;border-radius:3px;min-width:40px;text-align:center}
.b-fire{color:#f85149;background:rgba(248,81,73,.15)}
.b-high{color:#d29922;background:rgba(210,153,34,.15)}
.b-info{color:#58a6ff;background:rgba(88,166,255,.1)}

/* Chain */
.chain-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px;margin-bottom:8px}
.chain-name{font-weight:600;font-size:13px;color:#e6edf3;margin-bottom:8px}
.chain-bar{height:4px;background:#21262d;border-radius:2px;margin:6px 0;overflow:hidden}
.chain-fill{height:100%;border-radius:2px;transition:width .3s}
.chain-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.chain-dot.fire{background:#f85149}.chain-dot.active{background:#3fb950}.chain-dot.pending{background:#484f58}

/* Attribution */
.att-row{display:flex;align-items:center;padding:4px 8px;gap:8px;font-size:11px;border-bottom:1px solid #21262d}
.att-row:last-child{border-bottom:none}

/* Dir heat */
.dir-row{display:flex;align-items:center;padding:5px 8px;gap:8px;border-radius:4px}
.dir-row:hover{background:rgba(88,166,255,.04)}
.dir-rank{width:20px;font-size:11px;color:#8b949e;text-align:right}
.dir-name{width:120px;font-size:12px;color:#c9d1d9}
.dir-bar-wrap{flex:1;height:14px;background:#0d1117;border-radius:3px;overflow:hidden}
.dir-bar{height:100%;border-radius:3px}
.dir-val{width:55px;font-size:11px;text-align:right;font-family:monospace}
.dir-count{width:35px;font-size:10px;color:#8b949e;text-align:right}

/* Chart modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:#0d1117;border:1px solid #30363d;border-radius:12px;width:92vw;max-width:1200px;height:88vh;display:flex;flex-direction:column}
.modal-head{padding:12px 20px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:15px;color:#e6edf3}
.modal-close{background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer}
.modal-body{flex:1;padding:12px;overflow:hidden}
.modal-body canvas{display:block}

/* Alert signal cards */
.a-card{display:flex;align-items:center;padding:6px 10px;border-radius:5px;margin:2px 0;cursor:pointer;gap:8px;font-size:12px;transition:all .12s}
.a-card:hover{filter:brightness(1.15)}
.a-l2{background:rgba(35,134,54,.08);border-left:3px solid #238636}
.a-l1{background:rgba(63,185,80,.06);border-left:3px solid #3fb950}
.a-wait{background:rgba(210,153,34,.06);border-left:3px solid #d29922}
.a-sell{background:rgba(248,81,73,.06);border-left:3px solid #f85149}
.a-miss{background:rgba(139,87,42,.06);border-left:3px solid #c26d36}

/* Portfolio */
.pf-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:12px;margin-bottom:8px}
.pf-card.alert{border-color:#f85149;background:rgba(248,81,73,.04)}
.pf-name{font-weight:600;font-size:13px}.pf-code{font-size:10px;color:#8b949e}
.pf-row{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.pf-ind{font-size:11px}.pf-ind-l{color:#8b949e}.pf-ind-v{font-family:monospace}
.pf-ind-v.pos{color:#3fb950}.pf-ind-v.neg{color:#f85149}
.pf-act{font-size:11px;padding:3px 8px;border-radius:4px;margin-top:8px;display:inline-block}
.pf-act.sell{background:rgba(248,81,73,.15);color:#f85149}
.pf-act.profit{background:rgba(63,185,80,.15);color:#3fb950}
.pf-act.hold{background:rgba(88,166,255,.1);color:#58a6ff}
.pf-act.watch{background:rgba(210,153,34,.1);color:#d29922}

.section-title{font-size:13px;font-weight:600;color:#e6edf3;margin:14px 0 6px;padding-bottom:5px;border-bottom:1px solid #21262d}
.section-title:first-child{margin-top:0}
.cluster-badge{display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:11px;background:rgba(210,153,34,.1);color:#d29922;border:1px solid rgba(210,153,34,.3)}

/* Collapse */
.collapse-header{cursor:pointer;display:flex;align-items:center;gap:6px}
.collapse-arrow{transition:.2s;font-size:10px}
.collapse-body{max-height:0;overflow:hidden;transition:max-height .3s}
.collapse-body.open{max-height:2000px}

/* Highlight */
.highlight{background:rgba(88,166,255,.08);border-radius:4px;padding:4px 8px;margin:4px 0;font-size:12px}
</style>
</head>
<body>

<div class="header">
    <h1>🦉 Mimo 投研仪表盘</h1>
    <div class="header-meta">
        <span id="healthBadge" class="health h-ok">⏳</span>
        <span id="headerTime"></span>
    </div>
</div>

<div class="nav-tabs" id="nav">
    <button class="nav-tab active" data-t="news">📰 催化</button>
    <button class="nav-tab" data-t="trend">🌊 大势</button>
    <button class="nav-tab" data-t="chains">🔗 双链</button>
    <button class="nav-tab" data-t="alerts">🚨 报警</button>
    <button class="nav-tab" data-t="attrib">📊 归因</button>
    <button class="nav-tab" data-t="portfolio">💼 持仓</button>
</div>

<!-- Tab 1: 催化 (Scanner + Analyst + B1/B2/B3) -->
<div class="tab-content active" id="t-news">
    <div class="kpi-grid" id="newsKPIs"></div>
    <div class="grid-2">
        <div>
            <div class="section-title">🔥 Scanner 信号 <span class="card-sub" id="scannerDate"></span></div>
            <div id="scannerSignals"></div>
            <div class="section-title">🔬 Analyst 分析 <span class="card-sub" id="analystDate"></span></div>
            <div id="analystSignals"></div>
        </div>
        <div>
            <div class="section-title">📊 B1/B2/B3 信号 <span class="card-sub" id="b1b2b3Date"></span></div>
            <div id="b1b2b3Signals"></div>
            <div class="section-title">✂️ 金叉/死叉 <span style="font-size:10px;color:#8b949e;">（最近5日）</span></div>
            <div id="crossSignals"></div>
        </div>
    </div>
</div>

<!-- Tab 2: 大势 -->
<div class="tab-content" id="t-trend">
    <div class="kpi-grid" id="trendKPIs"></div>
    <div class="grid-2">
        <div class="card">
            <div class="card-title">📈 方向热度<span class="card-sub" id="trendDate"></span></div>
            <div id="dirHeat"></div>
        </div>
        <div>
            <div class="card"><div class="card-title">🔥 板块集群</div><div id="trendClusters"></div></div>
            <div class="card">
                <div class="card-title">📊 板块KDJ<span class="card-sub" id="kdjDate"></span></div>
                <div style="max-height:300px;overflow-y:auto">
                <table style="width:100%;font-size:11px;border-collapse:collapse">
                <thead><tr style="color:#8b949e;border-bottom:1px solid #21262d"><th style="text-align:left;padding:3px">板块</th><th style="text-align:right;padding:3px">标的</th><th style="text-align:right;padding:3px">均K</th><th style="text-align:right;padding:3px">均J</th><th style="text-align:right;padding:3px">J&lt;15</th><th style="text-align:right;padding:3px">趋势</th></tr></thead>
                <tbody id="sectorKDJ"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<!-- Tab 3: 双链 -->
<div class="tab-content" id="t-chains">
    <div id="chainProgress"></div>
    <div class="section-title">📍 拐点信号 <span class="card-sub" id="inflectionDate"></span></div>
    <div id="inflectionPoints"></div>
</div>

<!-- Tab 4: 报警 (KDJ双级) -->
<div class="tab-content" id="t-alerts">
    <div class="kpi-grid" id="alertKPIs"></div>
    <div id="alertClusters"></div>
    <div class="grid-2">
        <div style="overflow-y:auto;max-height:80vh">
            <div class="section-title">⭐ 优先关注 <span class="card-sub">（综合得分排序 Top 15）</span></div>
            <div id="alertPriority"></div>
            <div class="section-title">📋 全部信号 <span class="card-sub" id="alertDate"></span></div>
            <div id="alertFullList"></div>
        </div>
        <div style="position:sticky;top:80px;height:80vh;overflow:hidden;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px">
            <div id="chartHead" style="font-size:14px;font-weight:600;color:#e6edf3;margin-bottom:8px">📈 点击左侧查看周线图</div>
            <div id="chartView" style="width:100%;height:calc(100% - 40px)"><canvas id="kdjCanvas" style="display:block;width:100%;height:100%"></canvas></div>
        </div>
    </div>
</div>

<!-- Tab 5: 归因 -->
<div class="tab-content" id="t-attrib">
    <div class="card"><div class="card-title">📊 涨跌归因 <span class="card-sub" id="attribDate"></span></div>
    <div id="attribList" style="max-height:75vh;overflow-y:auto"></div></div>
</div>

<!-- Tab 6: 持仓 -->
<div class="tab-content" id="t-portfolio">
    <div class="kpi-grid" id="pfKPIs"></div>
    <div id="pfGrid"></div>
</div>

<!-- Chart Modal -->
<div class="modal-overlay" id="chartModal">
    <div class="modal-box"><div class="modal-head"><h3 id="chartTitle">📈</h3><button class="modal-close" onclick="closeChart()">✕</button></div>
    <div class="modal-body" id="chartBody"><canvas id="modalCanvas"></canvas></div></div>
</div>

<script>
async function loadJSON(p){const r=await fetch(p+'?v='+Date.now().toString(36));if(!r.ok)throw new Error(p);return r.json()}

// Nav
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    document.getElementById('t-'+t.dataset.t).classList.add('active');
    let fns={news:loadNews,trend:loadTrend,chains:loadChains,alerts:loadAlerts,attrib:loadAttrib,portfolio:loadPortfolio};
    if(fns[t.dataset.t])fns[t.dataset.t]();
}));

// Init
(async function init(){
    document.getElementById('headerTime').textContent=new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
    try{let sc=await loadJSON('data/self_check.json').catch(()=>null);if(sc){let h=sc.health_score||0,b=document.getElementById('healthBadge');
    if(h>=85){b.className='health h-ok';b.textContent='🟢 '+h}else if(h>=60){b.className='health h-warn';b.textContent='🟡 '+h}else{b.className='health h-err';b.textContent='🔴 '+h}}}catch(e){}
    loadNews();
})();

// ===== TAB 1: 催化 =====
let scannerD,analystD,briefD,sigsDailyD;
async function loadNews(){
    try{
        [scannerD,analystD,briefD,sigsDailyD]=await Promise.all([
            loadJSON('data/scanner.json').catch(()=>null),loadJSON('data/analyst.json').catch(()=>null),
            loadJSON('data/daily-brief.json').catch(()=>null),loadJSON('data/signals-daily.json').catch(()=>null)
        ]);
        let scSigs=scannerD?.signals||[],anSigs=analystD?.signals||[];
        let fireN=scannerD?.fire_signals_for_deep_analysis?.length||0;
        let an=analystD?.signals||[],div=analystD?.divergences||[],triple=an.filter(s=>s.triple_confirmed||s.confidence==='triple').length;
        document.getElementById('scannerDate').textContent=' '+((scannerD?.date||'')+'').slice(0,10);
        document.getElementById('analystDate').textContent=' '+((analystD?.date||'')+'').slice(0,10);
        document.getElementById('newsKPIs').innerHTML=[
            {v:scSigs.length,l:'Scanner信号'},{v:fireN,l:'🔥 Fire',c:fireN>0?'red':''},
            {v:anSigs.length,l:'Analyst分析'},{v:triple,l:'三重确认',c:triple>0?'green':''},
            {v:div.length||0,l:'背离信号',c:(div.length||0)>3?'gold':''}
        ].map(k=>`<div class="kpi"><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-label">${k.l}</div></div>`).join('');

        // Scanner signals
        let scHTML=scSigs.length?scSigs.map(s=>{
            let cls=s.priority==='fire'?'sig-fire':s.priority==='high'?'sig-high':'sig-norm';
            let badge=s.priority==='fire'?'<span class="sig-badge b-fire">🔥</span>':s.priority==='high'?'<span class="sig-badge b-high">HIGH</span>':'<span class="sig-badge b-info">'+((s.stage||'?')+'').slice(0,4)+'</span>';
            let chain=(s.chain||'').replace('chain1','链一').replace('chain2','链二').replace('chain1+chain2','双链')||'';
            return `<div class="sig-row ${cls}" style="flex-wrap:wrap">
                ${badge}<span style="font-weight:600;min-width:60px">${(s.title||s.id||'?')+''}</span>
                <span class="mono" style="color:#8b949e;font-size:10px">${chain}</span>
                <span style="color:#8b949e;font-size:10px;flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(s.summary||s.description||'')+''}</span>
            </div>`;
        }).join(''):'<div class="empty">无Scanner信号</div>';
        document.getElementById('scannerSignals').innerHTML=scHTML;

        // Analyst signals - collapse first 8, expand rest
        let anTop=anSigs.slice(0,6),anRest=anSigs.slice(6);
        let anHTML=anTop.map(s=>renderAnalystSig(s)).join('');
        if(anRest.length)anHTML+=`<div class="collapse-header" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.collapse-arrow').textContent=this.nextElementSibling.classList.contains('open')?'▼':'▶'"><span class="collapse-arrow">▶</span><span style="font-size:11px;color:#8b949e">更多 ${anRest.length} 条分析</span></div><div class="collapse-body">${anRest.map(s=>renderAnalystSig(s)).join('')}</div>`;
        document.getElementById('analystSignals').innerHTML=anHTML||'<div class="empty">无Analyst分析</div>';

        // B1/B2/B3
        renderB1B2B3();
        // Cross signals
        renderCrossSignals();

    }catch(e){console.log('News err:',e)}
}
function renderAnalystSig(s){
    let conf={'triple':'🟢三重确认','dual':'🟡双重确认','single':'⚪单一来源','unverified':'🔴未验证'};
    let chain=(s.chain||'').replace('chain1','链一').replace('chain2','链二');
    let tags=(s.tags||[]).slice(0,4).map(t=>`<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:rgba(88,166,255,.1);color:#58a6ff">${t}</span>`).join(' ');
    return `<div class="highlight">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-weight:600;font-size:12px">${(s.title||s.id||'?')+''}</span><span class="mono" style="color:#8b949e;font-size:10px">${chain||''}</span>${tags}<span style="font-size:10px;margin-left:auto;color:${s.confidence==='triple'?'#3fb950':s.confidence==='dual'?'#d29922':'#8b949e'}">${conf[s.confidence]||s.confidence||''}</span></div>
        <div style="font-size:11px;color:#c9d1d9">${(s.analysis||s.summary||'')+''}</div>
        ${s.under_priced?'<div style="margin-top:4px;font-size:10px;color:#3fb950">💡 可能被低估</div>':''}
    </div>`;
}
function renderB1B2B3(){
    if(!sigsDailyD){document.getElementById('b1b2b3Signals').innerHTML='<div class="empty">无数据</div>';return}
    let d=sigsDailyD;
    document.getElementById('b1b2b3Date').textContent=' ('+((d.date||'')+'').slice(0,10)+')';
    let b1=(d.b1||[]).slice(0,12),b2=(d.b2||[]).slice(0,8),b3=(d.b3||[]).slice(0,8);
    let was=(d.washout||[]).slice(0,8);
    let html='';
    if(b1.length)html+='<div style="font-size:11px;font-weight:600;color:#3fb950;margin-bottom:4px">B1 超卖拐点 ('+b1.length+'只)</div>'+b1.map(s=>`<div class="sig-row sig-fire"><span class="sig-badge b-fire">B1</span><span style="font-weight:600">${s.name||s[1]||'?'}</span><span class="mono" style="color:#58a6ff">${s.code||s[0]||''}</span><span class="mono">J=${(s.J||s[6]||0).toFixed(0)}</span></div>`).join('');
    if(b2.length)html+='<div style="font-size:11px;font-weight:600;color:#d29922;margin:8px 0 4px">B2 确认中阳 ('+b2.length+'只)</div>'+b2.map(s=>`<div class="sig-row sig-high"><span class="sig-badge b-high">B2</span><span style="font-weight:600">${s.name||s[1]||'?'}</span><span class="mono" style="color:#58a6ff">${s.code||s[0]||''}</span></div>`).join('');
    if(b3.length)html+='<div style="font-size:11px;font-weight:600;color:#58a6ff;margin:8px 0 4px">B3 一致确认 ('+b3.length+'只)</div>'+b3.map(s=>`<div class="sig-row sig-norm"><span class="sig-badge b-info">B3</span><span style="font-weight:600">${s.name||s[1]||'?'}</span><span class="mono" style="color:#58a6ff">${s.code||s[0]||''}</span></div>`).join('');
    if(was.length)html+='<div style="font-size:11px;font-weight:600;color:#c9d1d9;margin:8px 0 4px">🧹 洗盘完成 ('+was.length+'只)</div>'+was.map(s=>`<div class="sig-row sig-norm"><span class="sig-badge">洗</span><span style="font-weight:600">${s.name||s[1]||'?'}</span><span class="mono" style="color:#58a6ff">${s.code||s[0]||''}</span></div>`).join('');
    document.getElementById('b1b2b3Signals').innerHTML=html||'<div class="empty">无信号</div>';
}
function renderCrossSignals(){
    if(!sigsDailyD){document.getElementById('crossSignals').innerHTML='<div class="empty">无数据</div>';return}
    let gd=sigsDailyD.golden||[],dh=sigsDailyD.death||[];
    let html='';

        let W=Math.max(700,box.width-20),H=Math.max(500,window.innerHeight*.7),ratio=.62,H1=Math.floor(H*ratio),H2=H-H1-24;
        let pL=60,pR=30,pT=15,pB=28,xR=W-pL-pR;
        let allP=w.flatMap(x=>[x.h,x.l]),bb=k.filter(x=>x&&x.yellow!=null).map(x=>x.yellow);
        let wh=k.filter(x=>x&&x.white!=null).map(x=>x.white),bs=k.filter(x=>x&&x.bbi_std!=null).map(x=>x.bbi_std);
        let allV=[...allP,...bb,...wh,...bs].filter(v=>v!=null&&isFinite(v));if(!allV.length)return;
        let minP=Math.min(...allV)*.97,maxP=Math.max(...allV)*1.03,pRng=(maxP-minP)||1,yR=H1-pT-5;
        function px(i){return pL+i*xR/Math.max(1,n-1)}function py(v){return pT+(maxP-v)/pRng*yR}
        let allK=k.filter(x=>x).flatMap(x=>[x.K,x.D,x.J]).filter(v=>v!=null),minK=allK.length?Math.min(...allK,-10):-20,maxK=allK.length?Math.max(...allK,110):120,kR=(maxK-minK)||1,y2R=H2-pB-5,y2B=H1+24;
        function py2(v){return y2B+pT+(maxK-v)/kR*y2R}
        body.innerHTML='';let cv=document.createElement('canvas');cv.width=W;cv.height=H;cv.style.display='block';cv.style.margin='0 auto';body.appendChild(cv);
        let ctx=cv.getContext('2d');ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
        // Grid
        ctx.strokeStyle='#1a1f2b';ctx.lineWidth=.5;
        for(let i=0;i<=4;i++){let y=pT+i*yR/4;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke()}
        ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,H1+12);ctx.lineTo(W-pR,H1+12);ctx.stroke();
        // BBI std
        ctx.strokeStyle='#6e7681';ctx.lineWidth=1.2;ctx.setLineDash([2,4]);ctx.beginPath();let st=false;
        for(let i=0;i<n;i++){if(k[i]&&k[i].bbi_std!=null){let x=px(i),y=py(k[i].bbi_std);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke();ctx.setLineDash([]);
        // 黄线 BBI
        ctx.strokeStyle='#d29922';ctx.lineWidth=1.8;ctx.setLineDash([5,3]);ctx.beginPath();st=false;
        for(let i=0;i<n;i++){if(k[i]&&k[i].yellow!=null){let x=px(i),y=py(k[i].yellow);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke();ctx.setLineDash([]);
        // 白线
        ctx.strokeStyle='#f0f6fc';ctx.lineWidth=1.5;ctx.beginPath();st=false;
        for(let i=0;i<n;i++){if(k[i]&&k[i].white!=null){let x=px(i),y=py(k[i].white);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke();
        // Candles
        let bw=Math.min(6,Math.max(1.5,xR/n*.35));
        w.forEach((cd,i)=>{let x=px(i),o=py(cd.o),c=py(cd.c),h=py(cd.h),l=py(cd.l),up=cd.c>=cd.o;ctx.strokeStyle=up?'#da3633':'#3fb950';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x,h);ctx.lineTo(x,l);ctx.stroke();let bh=Math.max(.5,Math.abs(o-c));ctx.fillStyle=up?'#da3633':'#3fb950';ctx.fillRect(x-bw/2,Math.min(o,c),bw,bh)});
        // Price labels
        ctx.fillStyle='#8b949e';ctx.font='9px monospace';ctx.textAlign='right';
        for(let i=0;i<=4;i++){let v=minP+i*pRng/4;ctx.fillText(v.toFixed(v>=100?0:2),pL-4,py(v)+3)}
        // Week labels
        ctx.textAlign='center';ctx.font='8px monospace';ctx.fillStyle='#484f58';
        for(let i=0;i<n;i++){if(i%Math.max(1,Math.floor(n/8))===0||i===n-1)ctx.fillText(w[i].d.slice(4),px(i),H1+18)}
        // KDJ grid
        ctx.strokeStyle='#1a1f2b';ctx.lineWidth=.5;[0,20,50,80,100].forEach(vv=>{let y=py2(vv);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke()});
        // KDJ lines
        [{k:'K',c:'#8b949e'},{k:'D',c:'#d29922'},{k:'J',c:'#58a6ff'}].forEach(cf=>{ctx.strokeStyle=cf.c;ctx.lineWidth=1;ctx.beginPath();st=false;for(let i=0;i<n;i++){if(k[i]&&k[i][cf.k]!=null){let x=px(i),y=py2(k[i][cf.k]);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke()});
        // KDJ labels
        ctx.fillStyle='#484f58';ctx.textAlign='right';ctx.font='8px monospace';[0,50,100].forEach(vv=>ctx.fillText(vv,pL-4,py2(vv)+3));
        // Legend
        ctx.font='10px sans-serif';
        [['━━ 白线 EMA','#f0f6fc'],['┅┅ BBI标','#6e7681'],['┅┅ 黄线 BBI','#d29922']].forEach(([t,c],i)=>{ctx.fillStyle=c;ctx.textAlign='left';ctx.fillText(t,pL+8+i*120,pT+14)});
        [['━ K','#8b949e'],['━ D','#d29922'],['━ J','#58a6ff']].forEach(([t,c],i)=>{ctx.fillStyle=c;ctx.textAlign='left';ctx.fillText(t,pL+8+i*70,y2B+pT+12)});
    }catch(e){body.innerHTML='<div class="empty">图表渲染失败</div>';console.log('Chart err:',e)}
}
function closeChart(){document.getElementById('chartModal').classList.remove('active')}
</script>
