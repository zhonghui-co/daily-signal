<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦉 Mimo 投研仪表盘</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; }

.header { background:linear-gradient(135deg,#1a1a2e,#16213e); border-bottom:1px solid #30363d; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-brand { display:flex; align-items:center; gap:10px; }
.header-brand h1 { font-size:18px; color:#58a6ff; }
.header-meta { font-size:11px; color:#8b949e; text-align:right; }
.header-meta .health { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; margin-right:8px; }
.health-ok { background:rgba(35,134,54,0.15); color:#3fb950; }
.health-warn { background:rgba(210,153,34,0.15); color:#d29922; }
.health-err { background:rgba(218,54,51,0.15); color:#f85149; }

.nav-tabs { display:flex; gap:0; background:#161b22; border-bottom:1px solid #30363d; padding:0 16px; }
.nav-tab { padding:10px 20px; background:none; border:none; color:#8b949e; cursor:pointer; font-size:14px; border-bottom:2px solid transparent; transition:all 0.2s; }
.nav-tab:hover { color:#c9d1d9; }
.nav-tab.active { color:#58a6ff; border-bottom-color:#58a6ff; font-weight:600; }

.tab-content { display:none; padding:16px; }
.tab-content.active { display:block; }

/* Cards */
.card { background:#161b22; border:1px solid #21262d; border-radius:8px; padding:16px; margin-bottom:12px; }
.card-title { font-size:13px; font-weight:600; color:#e6edf3; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #21262d; }
.card-subtitle { font-size:10px; color:#8b949e; font-weight:400; margin-left:6px; }

/* Direction heat */
.dir-row { display:flex; align-items:center; padding:6px 8px; gap:10px; border-radius:4px; cursor:default; }
.dir-row:hover { background:rgba(88,166,255,0.04); }
.dir-rank { width:20px; font-size:11px; color:#8b949e; text-align:right; }
.dir-name { width:130px; font-size:12px; font-weight:500; color:#c9d1d9; }
.dir-bar-wrap { flex:1; height:16px; background:#0d1117; border-radius:3px; overflow:hidden; position:relative; }
.dir-bar { height:100%; border-radius:3px; transition:width 0.3s; }
.dir-val { width:60px; font-size:11px; text-align:right; font-family:monospace; }
.dir-count { width:40px; font-size:10px; color:#8b949e; text-align:right; }
.dir-flow { width:70px; font-size:10px; text-align:right; font-family:monospace; }

/* Cluster badges */
.cluster-badge { display:inline-block; padding:2px 8px; margin:2px; border-radius:4px; font-size:11px; background:rgba(210,153,34,0.1); color:#d29922; border:1px solid rgba(210,153,34,0.3); }
.cluster-fire { background:rgba(218,54,51,0.1); color:#f85149; border-color:rgba(248,81,73,0.3); }

/* Signal cards */
.signal-card { display:flex; align-items:center; padding:8px 12px; margin:3px 0; border-radius:6px; cursor:pointer; gap:10px; font-size:12px; transition:all 0.15s; }
.signal-card:hover { filter:brightness(1.15); transform:translateX(2px); }
.signal-l2 { background:rgba(35,134,54,0.08); border-left:3px solid #238636; }
.signal-l1 { background:rgba(63,185,80,0.06); border-left:3px solid #3fb950; }
.signal-wait { background:rgba(210,153,34,0.06); border-left:3px solid #d29922; }
.signal-sell { background:rgba(248,81,73,0.06); border-left:3px solid #f85149; }
.signal-missed { background:rgba(139,87,42,0.06); border-left:3px solid #c26d36; }
.signal-badge { font-size:10px; padding:1px 6px; border-radius:3px; }
.badge-b1 { color:#3fb950; background:rgba(63,185,80,0.15); }
.badge-sell { color:#f85149; background:rgba(248,81,73,0.15); }
.badge-wait { color:#d29922; background:rgba(210,153,34,0.15); }

/* Portfolio */
.pf-card { background:#161b22; border:1px solid #21262d; border-radius:8px; padding:14px; margin-bottom:8px; }
.pf-card.alert { border-color:#f85149; background:rgba(248,81,73,0.04); }
.pf-name { font-weight:600; color:#e6edf3; font-size:13px; }
.pf-code { font-size:10px; color:#8b949e; }
.pf-row { display:flex; gap:20px; margin-top:8px; flex-wrap:wrap; }
.pf-ind { font-size:11px; }
.pf-ind-label { color:#8b949e; }
.pf-ind-val { font-family:monospace; color:#c9d1d9; }
.pf-ind-val.positive { color:#3fb950; }
.pf-ind-val.negative { color:#f85149; }
.pf-action { font-size:11px; padding:4px 10px; border-radius:4px; margin-top:8px; display:inline-block; }
.pf-action.sell { background:rgba(248,81,73,0.15); color:#f85149; }
.pf-action.profit { background:rgba(63,185,80,0.15); color:#3fb950; }
.pf-action.hold { background:rgba(88,166,255,0.1); color:#58a6ff; }
.pf-action.watch { background:rgba(210,153,34,0.1); color:#d29922; }

/* Chart modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; justify-content:center; align-items:center; }
.modal-overlay.active { display:flex; }
.modal-box { background:#0d1117; border:1px solid #30363d; border-radius:12px; width:90vw; max-width:1200px; height:85vh; display:flex; flex-direction:column; }
.modal-header { padding:12px 20px; border-bottom:1px solid #21262d; display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-size:15px; color:#e6edf3; }
.modal-close { background:none; border:none; color:#8b949e; font-size:20px; cursor:pointer; }
.modal-body { flex:1; padding:16px; overflow:hidden; }
.modal-body canvas { display:block; }

/* Utility */
.empty { color:#484f58; font-size:12px; padding:20px; text-align:center; }
.loading { color:#8b949e; font-size:12px; padding:20px; text-align:center; }
.red { color:#f85149; }
.green { color:#3fb950; }
.gold { color:#d29922; }
.mono { font-family:monospace; font-size:11px; }

/* Grid */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
@media (max-width:768px) { .grid-2,.grid-3 { grid-template-columns:1fr; } }

.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; margin-bottom:12px; }
.kpi { background:#161b22; border:1px solid #21262d; border-radius:6px; padding:10px; text-align:center; }
.kpi-val { font-size:20px; font-weight:700; }
.kpi-label { font-size:10px; color:#8b949e; margin-top:2px; }

.flow-pos { color:#3fb950; }
.flow-neg { color:#f85149; }

/* Section */
.section-title { font-size:13px; font-weight:600; color:#e6edf3; margin:16px 0 8px 0; padding-bottom:6px; border-bottom:1px solid #21262d; }
.section-title:first-child { margin-top:0; }
</style>
</head>
<body>

<div class="header">
    <div class="header-brand">
        <h1>🦉 Mimo 投研仪表盘</h1>
    </div>
    <div class="header-meta">
        <span id="healthBadge" class="health health-ok">⏳</span>
        <span id="headerTime"></span>
    </div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" data-tab="trend">🌊 大势</button>
    <button class="nav-tab" data-tab="signals">🎯 信号</button>
    <button class="nav-tab" data-tab="portfolio">💼 持仓</button>
</div>

<!-- Tab 1: 大势 -->
<div class="tab-content active" id="tab-trend">
    <div class="kpi-grid" id="trendKPIs"></div>
    <div class="grid-2">
        <div class="card">
            <div class="card-title">📈 方向热度<span class="card-subtitle" id="trendDate"></span></div>
            <div id="dirHeat"></div>
        </div>
        <div>
            <div class="card">
                <div class="card-title">🔥 板块集群信号</div>
                <div id="trendClusters"></div>
            </div>
            <div class="card">
                <div class="card-title">📊 板块KDJ超卖<span class="card-subtitle" id="kdjDate"></span></div>
                <div style="max-height:300px;overflow-y:auto;">
                    <table style="width:100%;font-size:11px;border-collapse:collapse;">
                        <thead><tr style="color:#8b949e;border-bottom:1px solid #21262d;"><th style="text-align:left;padding:4px;">板块</th><th style="text-align:right;padding:4px;">标的</th><th style="text-align:right;padding:4px;">均K</th><th style="text-align:right;padding:4px;">均J</th><th style="text-align:right;padding:4px;">J&lt;15</th></tr></thead>
                        <tbody id="sectorKDJ"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Tab 2: 信号 -->
<div class="tab-content" id="tab-signals">
    <div class="kpi-grid" id="signalKPIs"></div>
    <div id="signalPriority"></div>
    <div class="section-title">📋 全部信号 <span class="card-subtitle" id="signalDate"></span></div>
    <div id="signalFullList"></div>
</div>

<!-- Tab 3: 持仓 -->
<div class="tab-content" id="tab-portfolio">
    <div class="kpi-grid" id="pfKPIs"></div>
    <div id="pfGrid"></div>
</div>

<!-- Chart Modal -->
<div class="modal-overlay" id="chartModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="chartTitle">📈 周线图</h3>
            <button class="modal-close" onclick="closeChart()">✕</button>
        </div>
        <div class="modal-body" id="chartBody">
            <canvas id="kdjCanvas" style="display:block;"></canvas>
        </div>
    </div>
</div>

<script>
// ===== Data loading =====
async function loadJSON(path) {
    const r = await fetch(path + '?v=' + Date.now().toString(36));
    if (!r.ok) throw new Error(path + ' ' + r.status);
    return r.json();
}

// ===== Navigation =====
document.querySelectorAll('.nav-tab').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t.dataset.tab).classList.add('active');
        if (t.dataset.tab === 'trend') loadTrend();
        if (t.dataset.tab === 'signals') loadSignals();
        if (t.dataset.tab === 'portfolio') loadPortfolio();
    });
});

// ===== Init =====
(async function init() {
    document.getElementById('headerTime').textContent = new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
    try {
        const sc = await loadJSON('data/self_check.json').catch(() => null);
        if (sc) {
            const h = sc.health_score || 0;
            const b = document.getElementById('healthBadge');
            if (h >= 85) { b.className = 'health health-ok'; b.textContent = '🟢 ' + h; }
            else if (h >= 60) { b.className = 'health health-warn'; b.textContent = '🟡 ' + h; }
            else { b.className = 'health health-err'; b.textContent = '🔴 ' + h; }
        }
    } catch(e) {}
    loadTrend();
})();

// ==========================================
//  TAB 1: 大势
// ==========================================
let themeCache = null, sectorCache = null, poolCache = null;

async function loadTrend() {
    try {
        const [theme, sector, pool, alerts] = await Promise.all([
            loadJSON('data/theme-data.json').catch(() => null),
            loadJSON('data/sector-oversold-index.json').catch(() => null),
            loadJSON('data/pool.json').catch(() => null),
            loadJSON('data/kdj-double-alert-lite.json').catch(() => null)
        ]);
        themeCache = theme; sectorCache = sector; poolCache = pool;

        // KPIs
        const hotDir = findHottestDirection(theme);
        const flowDir = findFlowDirection(theme);
        const b1Count = (alerts?.l2_buy?.length||0) + (alerts?.l1_buy?.length||0);
        const sellCount = alerts?.l1_sell?.length||0;
        document.getElementById('trendKPIs').innerHTML = [
            {v: hotDir?.name||'-', l: '今日最强方向', c: hotDir?.pct>0?'red':''},
            {v: flowDir?.flow||'-', l: '主力资金流向', c: flowDir?.pos?'flow-pos':'flow-neg'},
            {v: b1Count, l: 'B1买点信号'},
            {v: sellCount, l: 'J>90卖点信号', c: sellCount>100?'red':''}
        ].map(k => `<div class="kpi"><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-label">${k.l}</div></div>`).join('');

        document.getElementById('trendDate').textContent = theme?.date ? ' ' + theme.date : '';

        // Direction heat
        renderDirectionHeat(theme);
        // Clusters
        renderClusters(alerts);
        // Sector KDJ
        renderSectorKDJ(sector);

    } catch(e) { console.log('Trend load err:', e); }
}

function findHottestDirection(theme) {
    if (!theme?.groups) return null;
    const valid = theme.groups.filter(g => g.count >= 2 && g.avg_pct != null);
    if (!valid.length) return null;
    const top = valid.reduce((a,b) => (a.avg_pct||0) > (b.avg_pct||0) ? a : b);
    return { name: top.group || top.name, pct: top.avg_pct };
}

function findFlowDirection(theme) {
    if (!theme?.groups) return null;
    const sorted = [...theme.groups].filter(g => g.net_flow).sort((a,b) => (b.net_flow||0)-(a.net_flow||0));
    if (!sorted.length) return null;
    const s = sorted[0];
    return { flow: (s.net_flow/1e8).toFixed(1)+'亿', pos: s.net_flow > 0 };
}

function renderDirectionHeat(theme) {
    const container = document.getElementById('dirHeat');
    if (!theme?.groups?.length) { container.innerHTML = '<div class="empty">无数据</div>'; return; }
    const maxPct = Math.max(...theme.groups.map(g => Math.abs(g.avg_pct||0)), 0.1);
    const sorted = [...theme.groups].sort((a,b) => (b.avg_pct||0) - (a.avg_pct||0)).slice(0, 15);
    
    container.innerHTML = sorted.map((g,i) => {
        const pct = (g.avg_pct||0);
        const w = Math.abs(pct) / maxPct * 100;
        return `<div class="dir-row">
            <span class="dir-rank">${i+1}</span>
            <span class="dir-name">${g.group||g.name||'?'}</span>
            <div class="dir-bar-wrap"><div class="dir-bar" style="width:${w}%;background:${pct>=0?'#da3633':'#3fb950'};"></div></div>
            <span class="dir-val" style="color:${pct>=0?'#da3633':'#3fb950'}">${pct>0?'+':''}${pct.toFixed(1)}%</span>
            <span class="dir-count">${g.count||0}只</span>
        </div>`;
    }).join('');
}

function renderClusters(alerts) {
    const container = document.getElementById('trendClusters');
    const clusters = alerts?.clusters || {};
    const entries = Object.entries(clusters).sort((a,b) => b[1]-a[1]);
    if (!entries.length) { container.innerHTML = '<div class="empty">无集群信号</div>'; return; }
    container.innerHTML = entries.map(([cat,n]) =>
        `<span class="cluster-badge${n>=5?' cluster-fire':''}">${cat} ×${n}</span>`
    ).join('') + '<div style="font-size:10px;color:#8b949e;margin-top:4px;">≥3只同方向同时触发 = 板块级行为，非个股噪音</div>';
}

function renderSectorKDJ(sector) {
    const tbody = document.getElementById('sectorKDJ');
    document.getElementById('kdjDate').textContent = sector?.date ? ' ' + sector.date : '';
    const items = sector?.sectors || [];
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">无数据</td></tr>'; return; }
    const sorted = [...items].sort((a,b) => (a.j_under_15_pct||0) - (b.j_under_15_pct||0));
    tbody.innerHTML = sorted.map(s => {
        const j15 = s.j_under_15_pct || 0;
        return `<tr>
            <td style="padding:4px;">${s.name||s.sector||'?'}</td>
            <td style="text-align:right;padding:4px;color:#8b949e;">${s.count||0}</td>
            <td style="text-align:right;padding:4px;font-family:monospace;">${(s.avg_k||0).toFixed(1)}</td>
            <td style="text-align:right;padding:4px;font-family:monospace;color:${(s.avg_j||0)<20?'#3fb950':'#c9d1d9'}">${(s.avg_j||0).toFixed(1)}</td>
            <td style="text-align:right;padding:4px;color:${j15>30?'#3fb950':j15>15?'#d29922':'#c9d1d9'}">${j15.toFixed(0)}%</td>
        </tr>`;
    }).join('');
}

// ==========================================
//  TAB 2: 信号
// ==========================================
let alertData = null, chartDataCache = null;

async function loadSignals() {
    try {
        if (!alertData) {
            alertData = await loadJSON('data/kdj-double-alert-lite.json');
        }
        const d = alertData;
        document.getElementById('signalDate').textContent = d.week_date ? ' 周截止 ' + d.week_date : '';

        const l2 = d.l2_buy || [], l1 = d.l1_buy || [], wait = d.wait_daily || [];
        const sell = d.l1_sell || [], missed = d.missed || [];
        
        // KPIs
        const clusters = Object.values(d.clusters||{}).filter(n=>n>=3).length;
        document.getElementById('signalKPIs').innerHTML = [
            {v: l2.length, l: '🔴 双超卖 B1', c: l2.length>0?'red':''},
            {v: l1.length, l: '🟡 一级买点', c: l1.length>0?'gold':''},
            {v: wait.length, l: '⏳ 等日线信号'},
            {v: clusters, l: '🔥 集群方向', c: clusters>0?'gold':''},
            {v: sell.length, l: '🟢 J>90卖点', c: sell.length>100?'red':''},
            {v: missed.length, l: '⚠️ 可能错过'}
        ].map(k => `<div class="kpi"><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-label">${k.l}</div></div>`).join('');

        // Priority signals (L2+L1, sorted by score)
        const allBuy = [...l2.map(s => ({...s, level:2})), ...l1.map(s => ({...s, level:1}))];
        allBuy.sort((a,b) => {
            const sa = (a.backtest_win_rate||0) * (a.backtest_avg_return||0) / 100;
            const sb = (b.backtest_win_rate||0) * (b.backtest_avg_return||0) / 100;
            return sb - sa;
        });

        const top = allBuy.slice(0, 10);
        document.getElementById('signalPriority').innerHTML = top.length ? 
            '<div class="section-title">⭐ 优先关注 <span class="card-subtitle">（综合得分 = 胜率 × 均收 / 100，前10）</span></div>' +
            top.map((s,i) => renderSignalRow(s, i+1)).join('') :
            '<div class="empty">暂无买入信号</div>';

        // Full list
        document.getElementById('signalFullList').innerHTML = 
            renderSignalSection('🔴 双超卖 B1 (周J<0, 白>黄, 日J≤15)', l2, 'signal-l2', 'B1') +
            renderSignalSection('🟡 一级买点 (0≤周J<15, 白>黄, 日J≤15)', l1, 'signal-l1', 'B1') +
            renderSignalSection('⏳ 等日线 (周J<15, 日J>15)', wait, 'signal-wait', '⏳') +
            renderSignalSection('🟢 一级卖点 (周J>90)', sell.slice(0,30), 'signal-sell', '卖') +
            (missed.length ? renderSignalSection('⚠️ 可能错过', missed, 'signal-missed', '⚠️') : '');

    } catch(e) { console.log('Signal load err:', e); }
}

function renderSignalSection(title, signals, cls, badge) {
    return signals.length ? 
        `<div class="section-title">${title} <span class="card-subtitle">(${signals.length}只)</span></div>` +
        signals.map((s,i) => renderSignalRow(s, null, cls, badge)).join('') : '';
}

function renderSignalRow(s, rank, cls, badge) {
    const wr = s.backtest_win_rate != null ? `<span class="green">${s.backtest_win_rate}%</span>` : '-';
    const ar = s.backtest_avg_return != null ? `<span style="color:${s.backtest_avg_return>0?'#da3633':'#3fb950'}">${s.backtest_avg_return>0?'+':''}${s.backtest_avg_return}%</span>` : '-';
    const dj = s.day_J != null ? s.day_J.toFixed(0) : '-';
    const score = (s.backtest_win_rate||0) * (s.backtest_avg_return||0) / 100;
    return `<div class="signal-card ${cls||''}" onclick="showChart('${s.ts_code}','${(s.name||'').replace(/'/g,"\\'")}')">
        ${rank ? '<span style="color:#8b949e;font-size:10px;min-width:16px;">#'+rank+'</span>' : ''}
        <span class="signal-badge ${badge==='B1'?'badge-b1':badge==='卖'?'badge-sell':badge==='⏳'?'badge-wait':''}" style="min-width:28px;text-align:center;">${badge||'?'}</span>
        <span style="font-weight:600;min-width:70px;">${s.name||''}</span>
        <span class="mono" style="color:#58a6ff;min-width:80px;">${s.ts_code||''}</span>
        <span style="color:#8b949e;font-size:10px;min-width:80px;">${s.theme_category||s.ff_column||''}</span>
        <span class="mono">周J:${(s.week_J||0).toFixed(0)}</span>
        <span class="mono">日J:${dj}</span>
        <span>胜率:${wr}</span>
        <span>均收:${ar}</span>
        <span class="mono" style="color:#d29922;">得分:${score.toFixed(0)}</span>
    </div>`;
}

// ==========================================
//  TAB 3: 持仓
// ==========================================
async function loadPortfolio() {
    try {
        const [ps, pr] = await Promise.all([
            loadJSON('data/portfolio-status.json').catch(() => null),
            loadJSON('/daily-signal/data/position-radar.json').catch(() => {
                return loadJSON('data/position-radar.json');
            }).catch(() => null)
        ]);

        const positions = ps?.positions || pr?.positions || [];
        // KPIs
        const pnlArr = positions.map(p => p.pnl_pct || p.radar?.pct_chg_today || 0).filter(v => !isNaN(v));
        const avgPnl = pnlArr.length ? pnlArr.reduce((a,b)=>a+b,0)/pnlArr.length : 0;
        const nearStop = positions.filter(p => {
            const dist = p.distance_to_yellow || p.radar?.distance_to_yellow;
            return dist != null && dist < 5 && dist > -5;
        }).length;
        const triggered = positions.filter(p => {
            const d = p.distance_to_yellow || p.radar?.distance_to_yellow;
            return d != null && d < 0;
        }).length;

        document.getElementById('pfKPIs').innerHTML = [
            {v: (avgPnl>=0?'+':'')+avgPnl.toFixed(1)+'%', l: '均浮动盈亏', c: avgPnl>=0?'green':'red'},
            {v: positions.length, l: '持仓数'},
            {v: nearStop, l: '⚠️ 接近止损(±5%)', c: nearStop>0?'red':''},
            {v: triggered, l: '🔴 跌破黄线', c: triggered>0?'red':''}
        ].map(k => `<div class="kpi"><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-label">${k.l}</div></div>`).join('');

        // Position cards
        document.getElementById('pfGrid').innerHTML = positions.length ? positions.map(p => {
            const r = p.radar || {};
            const a = p.alerts || [];
            const pnl = p.pnl_pct ?? r.pct_chg_today;
            const price = p.price || r.latest_price;
            const yellow = p.yellow ?? r.yellow_line;
            const white = p.white ?? r.white_line;
            const distY = p.distance_to_yellow ?? r.distance_to_yellow;
            const isAlert = (distY != null && distY < 5) || a.length > 0;
            
            let action = '';
            if (distY != null && distY < 0) action = '<span class="pf-action sell">🔴 跌破黄线 — 考虑离场</span>';
            else if (pnl != null && pnl > 20) action = '<span class="pf-action profit">📈 浮盈>20% — 可部分止盈</span>';
            else if (distY != null && distY < 5) action = '<span class="pf-action watch">⚠️ 接近黄线 — 密切关注</span>';
            else if (pnl != null && pnl > 0) action = '<span class="pf-action hold">✅ 趋势完好，持仓观望</span>';
            else if (pnl != null && pnl < 0) action = '<span class="pf-action watch">⏳ 浮亏中，设好止损</span>';

            return `<div class="pf-card${isAlert?' alert':''}">
                <div class="pf-name">${p.name||'?'} <span class="pf-code">${p.code||p.ts_code||'?'}</span></div>
                <div class="pf-row">
                    <div class="pf-ind"><div class="pf-ind-label">现价</div><div class="pf-ind-val">${price||'-'}</div></div>
                    <div class="pf-ind"><div class="pf-ind-label">浮动</div><div class="pf-ind-val ${pnl>=0?'positive':'negative'}">${pnl!=null?(pnl>=0?'+':'')+pnl.toFixed(1)+'%':'-'}</div></div>
                    <div class="pf-ind"><div class="pf-ind-label">白线</div><div class="pf-ind-val mono">${white||'-'}</div></div>
                    <div class="pf-ind"><div class="pf-ind-label">黄线</div><div class="pf-ind-val mono" style="color:#d29922;">${yellow||'-'}</div></div>
                    <div class="pf-ind"><div class="pf-ind-label">距黄线</div><div class="pf-ind-val ${distY>=0?'positive':'negative'}">${distY!=null?(distY>=0?'+':'')+distY.toFixed(1)+'%':'-'}</div></div>
                </div>
                ${action}
                ${a.length ? '<div style="font-size:10px;color:#f85149;margin-top:6px;">🔔 '+a.map(x=>x.title||x.msg||'').join(' | ')+'</div>' : ''}
            </div>`;
        }).join('') : '<div class="empty">无持仓数据</div>';

    } catch(e) { console.log('Portfolio load err:', e); }
}

// ==========================================
//  CHART (Canvas weekly chart)
// ==========================================
async function showChart(code, name) {
    document.getElementById('chartModal').classList.add('active');
    document.getElementById('chartTitle').textContent = '📈 ' + name + '  ' + code;
    const body = document.getElementById('chartBody');
    body.innerHTML = '<div class="loading">⏳ 加载图表数据…</div>';

    try {
        if (!chartDataCache) {
            chartDataCache = await loadJSON('data/kdj-chart-data.json');
        }
        const ch = (chartDataCache||{})[code];
        if (!ch || !ch.weeks || ch.weeks.length < 5) {
            body.innerHTML = '<div class="empty">图表数据不足</div>'; return;
        }

        let weeks = ch.weeks.slice(-60);
        let kdj = ch.kdj ? ch.kdj.slice(-60) : [];
        let fv = 0;
        for (let i = 0; i < Math.min(weeks.length,kdj.length); i++) {
            if (kdj[i] && kdj[i].white != null && kdj[i].yellow != null) { fv = i; break; }
        }
        weeks = weeks.slice(fv).slice(-50);
        kdj = kdj.slice(fv).slice(-50);

        const n = weeks.length;
        const box = body.getBoundingClientRect();
        const W = Math.max(600, box.width - 32);
        const H = Math.max(400, window.innerHeight * 0.7);
        const ratio = 0.62;
        const H1 = Math.floor(H * ratio), H2 = H - H1 - 24;
        const padL = 60, padR = 30, padT = 12, padB = 28;

        body.innerHTML = '';
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        canvas.style.display = 'block';
        canvas.style.margin = '0 auto';
        body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H);

        const xRange = W - padL - padR;
        const allP = weeks.flatMap(w => [w.h, w.l]);
        const bb = kdj.filter(k=>k&&k.yellow!=null).map(k=>k.yellow);
        const wh = kdj.filter(k=>k&&k.white!=null).map(k=>k.white);
        const bs = kdj.filter(k=>k&&k.bbi_std!=null).map(k=>k.bbi_std);
        const allV = [...allP, ...bb, ...wh, ...bs].filter(v=>v!=null&&isFinite(v));
        if (!allV.length) return;
        const minP = Math.min(...allV)*0.97, maxP = Math.max(...allV)*1.03;
        const pR = (maxP-minP)||1, yR = H1-padT-4;

        function px(i) { return padL + i*xRange/Math.max(1,n-1); }
        function py(v) { return padT + (maxP-v)/pR*yR; }

        const allKDJ = kdj.filter(k=>k).flatMap(k=>[k.K,k.D,k.J]).filter(v=>v!=null);
        const minKDJ = allKDJ.length ? Math.min(...allKDJ, -10) : -20;
        const maxKDJ = allKDJ.length ? Math.max(...allKDJ, 110) : 120;
        const kR = (maxKDJ-minKDJ)||1, y2R = H2-padB-5, y2B = H1+24;
        function py2(v) { return y2B+padT+(maxKDJ-v)/kR*y2R; }

        // Grid
        ctx.strokeStyle = '#1a1f2b'; ctx.lineWidth = 0.5;
        for (let i=0;i<=4;i++) {
            let y=padT+i*yR/4; ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        }
        ctx.strokeStyle = '#30363d'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL,H1+12); ctx.lineTo(W-padR,H1+12); ctx.stroke();

        // BBI std (gray)
        ctx.strokeStyle = '#6e7681'; ctx.lineWidth = 1.2; ctx.setLineDash([2,4]);
        ctx.beginPath(); let s=false;
        for (let i=0;i<n;i++) {
            if (kdj[i]&&kdj[i].bbi_std!=null) {
                let x=px(i),y=py(kdj[i].bbi_std);
                if(!s){ctx.moveTo(x,y);s=true;} else ctx.lineTo(x,y);
            }
        }
        ctx.stroke(); ctx.setLineDash([]);

        // 黄线 BBI(14,28,57,114)
        ctx.strokeStyle = '#d29922'; ctx.lineWidth = 1.8; ctx.setLineDash([5,3]);
        ctx.beginPath(); s=false;
        for (let i=0;i<n;i++) {
            if (kdj[i]&&kdj[i].yellow!=null) {
                let x=px(i),y=py(kdj[i].yellow);
                if(!s){ctx.moveTo(x,y);s=true;} else ctx.lineTo(x,y);
            }
        }
        ctx.stroke(); ctx.setLineDash([]);

        // 白线
        ctx.strokeStyle = '#f0f6fc'; ctx.lineWidth = 1.5;
        ctx.beginPath(); s=false;
        for (let i=0;i<n;i++) {
            if (kdj[i]&&kdj[i].white!=null) {
                let x=px(i),y=py(kdj[i].white);
                if(!s){ctx.moveTo(x,y);s=true;} else ctx.lineTo(x,y);
            }
        }
        ctx.stroke();

        // Candles
        const bodyW = Math.min(6, Math.max(1.5, xRange/n*0.35));
        weeks.forEach((w,i) => {
            let x=px(i),o=py(w.o),c=py(w.c),h=py(w.h),l=py(w.l);
            let up=w.c>=w.o;
            ctx.strokeStyle=up?'#da3633':'#3fb950'; ctx.lineWidth=0.8;
            ctx.beginPath(); ctx.moveTo(x,h); ctx.lineTo(x,l); ctx.stroke();
            let bh=Math.max(0.5,Math.abs(o-c));
            ctx.fillStyle=up?'#da3633':'#3fb950';
            ctx.fillRect(x-bodyW/2,Math.min(o,c),bodyW,bh);
        });

        // Price labels
        ctx.fillStyle='#8b949e'; ctx.font='9px monospace'; ctx.textAlign='right';
        for (let i=0;i<=4;i++) {
            let v=minP+i*pR/4;
            ctx.fillText(v.toFixed(v>=100?0:2),padL-4,py(v)+3);
        }

        // Week labels
        ctx.textAlign='center'; ctx.font='8px monospace'; ctx.fillStyle='#484f58';
        for (let i=0;i<n;i++) {
            if (i%Math.max(1,Math.floor(n/8))===0||i===n-1) {
                ctx.fillText(weeks[i].d.slice(4),px(i),H1+18);
            }
        }

        // KDJ sub-chart grid
        ctx.strokeStyle='#1a1f2b'; ctx.lineWidth=0.5;
        [0,20,50,80,100].forEach(vv=>{
            let y=py2(vv); ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
        });

        // KDJ lines
        [{k:'K',c:'#8b949e'},{k:'D',c:'#d29922'},{k:'J',c:'#58a6ff'}].forEach(cfg=>{
            ctx.strokeStyle=cfg.c; ctx.lineWidth=1; ctx.beginPath(); s=false;
            for (let i=0;i<n;i++) {
                if(kdj[i]&&kdj[i][cfg.k]!=null){
                    let x=px(i),y=py2(kdj[i][cfg.k]);
                    if(!s){ctx.moveTo(x,y);s=true;} else ctx.lineTo(x,y);
                }
            }
            ctx.stroke();
        });

        // KDJ labels
        ctx.fillStyle='#484f58'; ctx.textAlign='right'; ctx.font='8px monospace';
        [0,50,100].forEach(vv=>ctx.fillText(vv,padL-4,py2(vv)+3));

        // Legend
        ctx.font='10px sans-serif';
        [['━━ 白线 EMA','#f0f6fc'],['┅┅ BBI标','#6e7681'],['┅┅ 黄线 BBI','#d29922']].forEach(([t,c],i)=>{
            ctx.fillStyle=c; ctx.textAlign='left'; ctx.fillText(t,padL+8+i*120,padT+14);
        });
        [['━ K','#8b949e'],['━ D','#d29922'],['━ J','#58a6ff']].forEach(([t,c],i)=>{
            ctx.fillStyle=c; ctx.textAlign='left'; ctx.fillText(t,padL+8+i*70,y2B+padT+12);
        });

    } catch(e) { body.innerHTML = '<div class="empty">图表渲染失败</div>'; console.log('Chart err:', e); }
}

function closeChart() {
    document.getElementById('chartModal').classList.remove('active');
    document.getElementById('chartBody').innerHTML = '<canvas id="kdjCanvas"></canvas>';
}
</script>
