<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦉 Mimo 投研仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid #30363d;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;color:#58a6ff}
.header-meta{font-size:11px;color:#8b949e;display:flex;align-items:center;gap:8px}
.health{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px}.h-ok{background:rgba(35,134,54,.15);color:#3fb950}.h-warn{background:rgba(210,153,34,.15);color:#d29922}.h-err{background:rgba(218,54,51,.15);color:#f85149}

.nav-tabs{display:flex;gap:0;background:#161b22;border-bottom:1px solid #30363d;padding:0 10px;overflow-x:auto}
.nav-tab{padding:9px 14px;background:none;border:none;color:#8b949e;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
.nav-tab:hover{color:#c9d1d9}.nav-tab.active{color:#58a6ff;border-bottom-color:#58a6ff;font-weight:600}
.tab-content{display:none;padding:12px}.tab-content.active{display:block}

.card{background:#161b22;border:1px solid #21262d;border-radius:7px;padding:12px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:6px}
.card-sub{font-size:10px;color:#8b949e;font-weight:400}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:10px}
.kpi{background:#161b22;border:1px solid #21262d;border-radius:5px;padding:8px;text-align:center}
.kpi-val{font-size:18px;font-weight:700}.kpi-label{font-size:9px;color:#8b949e;margin-top:1px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:850px){.grid-2{grid-template-columns:1fr}}

.empty{color:#484f58;font-size:12px;padding:12px;text-align:center}
.mono{font-family:monospace;font-size:11px}
.red{color:#f85149}.green{color:#3fb950}.gold{color:#d29922}.blue{color:#58a6ff}

.signal-row{display:flex;align-items:center;padding:4px 8px;border-radius:4px;gap:6px;font-size:11px;margin:1px 0;flex-wrap:wrap}
.signal-row:hover{background:rgba(88,166,255,.04)}
.s-fire{background:rgba(218,54,51,.06);border-left:3px solid #da3633}
.s-high{background:rgba(210,153,34,.05);border-left:3px solid #d29922}
.s-norm{background:rgba(31,111,235,.03);border-left:3px solid #1f6feb}

.badge{font-size:9px;padding:1px 4px;border-radius:3px;min-width:28px;text-align:center}
.b-fire{color:#f85149;background:rgba(248,81,73,.12)}.b-high{color:#d29922;background:rgba(210,153,34,.12)}.b-info{color:#58a6ff;background:rgba(88,166,255,.1)}.b-green{color:#3fb950;background:rgba(63,185,80,.12)}

.dir-row{display:flex;align-items:center;padding:3px 6px;gap:6px;border-radius:3px;font-size:11px}
.dir-row:hover{background:rgba(88,166,255,.04)}
.dir-rank{width:16px;font-size:10px;color:#8b949e;text-align:right}
.dir-name{width:100px;font-size:11px;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.cluster-badge{display:inline-block;padding:2px 7px;margin:2px;border-radius:3px;font-size:10px;background:rgba(210,153,34,.1);color:#d29922;border:1px solid rgba(210,153,34,.3)}

.highlight{background:rgba(88,166,255,.05);border-radius:4px;padding:6px 8px;margin:4px 0;font-size:11px}
.section-title{font-size:12px;font-weight:600;color:#e6edf3;margin:12px 0 4px;padding-bottom:3px;border-bottom:1px solid #21262d}.section-title:first-child{margin-top:0}

.a-card{display:flex;align-items:center;padding:5px 8px;border-radius:4px;margin:2px 0;cursor:pointer;gap:6px;font-size:11px;transition:all .1s;flex-wrap:wrap}
.a-card:hover{filter:brightness(1.1)}
.a-l2{background:rgba(35,134,54,.08);border-left:3px solid #238636}
.a-l1{background:rgba(63,185,80,.06);border-left:3px solid #3fb950}
.a-wait{background:rgba(210,153,34,.06);border-left:3px solid #d29922}
.a-sell{background:rgba(248,81,73,.06);border-left:3px solid #f85149}
.a-miss{background:rgba(139,87,42,.06);border-left:3px solid #c26d36}

.pf-card{background:#161b22;border:1px solid #21262d;border-radius:7px;padding:10px;margin-bottom:6px}
.pf-card.alert{border-color:#f85149;background:rgba(248,81,73,.04)}
.pf-name{font-weight:600;font-size:13px}.pf-code{font-size:10px;color:#8b949e}
.pf-row{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap}
.pf-ind{font-size:10px}.pf-ind-l{color:#8b949e}.pf-ind-v{font-family:monospace;font-size:11px}
.pf-ind-v.pos{color:#3fb950}.pf-ind-v.neg{color:#f85149}
.pf-act{font-size:10px;padding:2px 7px;border-radius:3px;margin-top:6px;display:inline-block}
.pf-act.sell{background:rgba(248,81,73,.15);color:#f85149}.pf-act.profit{background:rgba(63,185,80,.15);color:#3fb950}.pf-act.hold{background:rgba(88,166,255,.1);color:#58a6ff}.pf-act.watch{background:rgba(210,153,34,.1);color:#d29922}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:#0d1117;border:1px solid #30363d;border-radius:10px;width:92vw;max-width:1200px;height:88vh;display:flex;flex-direction:column}
.modal-head{padding:10px 16px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:14px;color:#e6edf3}
.modal-close{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer}
.modal-body{flex:1;padding:8px;overflow:hidden}.modal-body canvas{display:block;margin:0 auto}

table.tbl{width:100%;font-size:11px;border-collapse:collapse}
.tbl th{color:#8b949e;font-weight:600;text-align:left;padding:3px 6px;border-bottom:1px solid #21262d}
.tbl td{padding:2px 6px;border-bottom:1px solid #161b22}
.tbl tr:hover td{background:rgba(88,166,255,.03)}

.collapse-h{cursor:pointer;display:flex;align-items:center;gap:4px;font-size:11px;color:#8b949e;margin-top:6px}
.collapse-arrow{transition:.2s;font-size:9px}
.collapse-body{max-height:0;overflow:hidden;transition:max-height .3s}
.collapse-body.open{max-height:4000px}
</style>
</head>
<body>

<div class="header">
    <h1>🦉 Mimo 投研仪表盘</h1>
    <div class="header-meta"><span id="healthBadge" class="health h-ok">⏳</span><span id="headerTime"></span></div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" data-t="news">📰 催化</button>
    <button class="nav-tab" data-t="trend">🌊 大势</button>
    <button class="nav-tab" data-t="chains">🔗 双链</button>
    <button class="nav-tab" data-t="alerts">🚨 报警</button>
    <button class="nav-tab" data-t="attrib">📊 归因</button>
    <button class="nav-tab" data-t="portfolio">💼 持仓</button>
</div>

<!-- ===== 催化 ===== -->
<div class="tab-content active" id="t-news">
<div class="kpi-grid" id="newsKPIs"></div>
<div class="grid-2">
<div><div class="section-title">🔥 Scanner 信号<span class="card-sub" id="scannerDate"></span></div><div id="scannerSignals"></div>
<div class="section-title">🔬 Analyst 深析<span class="card-sub" id="analystDate"></span></div><div id="analystSignals"></div></div>
<div><div class="section-title">📊 B1/B2/B3 全景</div><div id="b1b2b3Signals"></div>
<div class="section-title">✂️ 金叉/死叉</div><div id="crossSignals"></div></div></div></div>

<!-- ===== 大势 ===== -->
<div class="tab-content" id="t-trend">
<div class="kpi-grid" id="trendKPIs"></div>
<div class="grid-2">
<div class="card"><div class="card-title">🔄 方向轮动排名<span class="card-sub" id="rotationDate"></span></div><div id="rotationRanking"></div></div>
<div><div class="card"><div class="card-title">📈 方向热度<span class="card-sub" id="themeDate"></span></div><div id="dirHeat"></div></div>
<div class="card"><div class="card-title">📊 量价分布</div><div id="volStats"></div></div></div></div>
<div class="grid-2" style="margin-top:8px">
<div class="card"><div class="card-title">🔥 板块集群</div><div id="trendClusters"></div></div>
<div class="card"><div class="card-title">📊 板块KDJ<span class="card-sub" id="kdjDate"></span></div>
<div style="max-height:280px;overflow-y:auto"><table class="tbl"><thead><tr><th>板块</th><th style="text-align:right">标的</th><th style="text-align:right">均K</th><th style="text-align:right">均J</th><th style="text-align:right">J&lt;15</th><th style="text-align:right">状态</th></tr></thead>
<tbody id="sectorKDJ"></tbody></table></div></div></div></div>

<!-- ===== 双链 ===== -->
<div class="tab-content" id="t-chains"><div id="chainProgress"></div><div class="section-title">📍 拐点信号</div><div id="inflectionPoints"></div></div>

<!-- ===== 报警 ===== -->
<div class="tab-content" id="t-alerts">
<div class="kpi-grid" id="alertKPIs"></div><div id="alertClusters"></div>
<div class="grid-2">
<div style="overflow-y:auto;max-height:80vh">
<div class="section-title">⭐ 优先关注<span class="card-sub">（综合得分 Top 15）</span></div><div id="alertPriority"></div>
<div class="section-title">📋 全部信号<span class="card-sub" id="alertDate"></span></div><div id="alertFullList"></div></div>
<div style="position:sticky;top:80px;height:80vh;overflow:hidden;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px">
<div id="chartHead" style="font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:6px">📈 点击左侧查看周线图</div>
<div id="chartView" style="width:100%;height:calc(100% - 30px)"><canvas id="kdjCanvas" style="display:block;width:100%;height:100%"></canvas></div></div></div></div>

<!-- ===== 归因 ===== -->
<div class="tab-content" id="t-attrib">
<div class="card"><div class="card-title">📊 涨跌归因<span class="card-sub" id="attribDate"></span></div>
<div style="max-height:75vh;overflow-y:auto"><div id="attribList"></div></div></div></div>

<!-- ===== 持仓 ===== -->
<div class="tab-content" id="t-portfolio">
<div class="kpi-grid" id="pfKPIs"></div><div id="pfGrid"></div></div>

<!-- Chart Modal -->
<div class="modal-overlay" id="chartModal">
<div class="modal-box"><div class="modal-head"><h3 id="chartTitle">📈</h3><button class="modal-close" onclick="closeChart()">✕</button></div>
<div class="modal-body" id="chartBody"><canvas id="modalCanvas"></canvas></div></div></div>

<script>
// ── Utils ──
async function L(p){const r=await fetch(p+'?v='+Date.now().toString(36));if(!r.ok)throw new Error(p);return r.json()}
function KPI(arr){return arr.map(k=>`<div class="kpi"><div class="kpi-val ${k.c||''}">${k.v}</div><div class="kpi-label">${k.l}</div></div>`).join('')}
function el(id){return document.getElementById(id)}
function fmtPct(v,d){if(v==null||isNaN(v))return'-';return(v>=0?'+':'')+v.toFixed(d||1)+'%'}
function fmtN(v,d){return v!=null&&!isNaN(v)?v.toFixed(d||1):'-'}

// ── Nav ──
document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    el('t-'+t.dataset.t).classList.add('active');
    let fns={news:loadNews,trend:loadTrend,chains:loadChains,alerts:loadAlerts,attrib:loadAttrib,portfolio:loadPortfolio};
    if(fns[t.dataset.t])fns[t.dataset.t]();
}));

// ── Init ──
(async function(){
    el('headerTime').textContent=new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
    try{let sc=await L('data/self_check.json').catch(()=>null);if(sc){let h=sc.health_score||0,b=el('healthBadge');
    if(h>=85){b.className='health h-ok';b.textContent='🟢 '+h}else if(h>=60){b.className='health h-warn';b.textContent='🟡 '+h}else{b.className='health h-err';b.textContent='🔴 '+h}}}catch(e){}
    loadNews();
})();

// ════════════════ TAB: 催化 ════════════════
let scD,anD,sdD;
async function loadNews(){
    try{[scD,anD,sdD]=await Promise.all([L('data/scanner.json').catch(()=>null),L('data/analyst.json').catch(()=>null),L('data/signals-daily.json').catch(()=>null)]);
    let scS=scD?.signals||[],anS=anD?.signals||[],fCount=scD?.fire_signals_for_deep_analysis?.length||0;
    let triple=anS.filter(s=>s.verification==='triple'||s.confidence==='green').length;
    el('scannerDate').textContent=' '+(scD?.date||'');el('analystDate').textContent=' '+(anD?.date||'');
    el('newsKPIs').innerHTML=KPI([{v:scS.length,l:'Scanner信号'},{v:fCount,l:'🔥 Fire',c:fCount>0?'red':''},{v:anS.length,l:'Analyst深析'},{v:triple,l:'高置信',c:triple>0?'green':''},{v:anD?.divergences?.length||0,l:'背离信号'},{v:sdD?.stats?.total||0,l:'池子标的',c:''}]);
    renderScanner(scS);renderAnalyst(anS);renderB1B2B3();renderCross();}catch(e){console.log(e)}
}
function renderScanner(sigs){
    el('scannerSignals').innerHTML=sigs.length?sigs.map(s=>{
        let cls=s.priority==='fire'?'s-fire':s.priority==='high'?'s-high':'s-norm';
        let badge=s.priority==='fire'?'<span class="badge b-fire">🔥</span>':'<span class="badge b-info">'+(s.lifecycle||'?')+'</span>';
        let ch=(s.chain||'').replace('chain1','链一').replace('chain2','链二');
        return `<div class="signal-row ${cls}">${badge}<span style="font-weight:600;min-width:60px">${s.title||s.id||'?'}</span><span class="mono" style="color:#8b949e">${ch}</span><span style="color:#8b949e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px">${s.summary||''}</span></div>`}).join(''):'<div class="empty">无Scanner信号</div>';
}
function renderAnalyst(sigs){
    let confMap={green:'🟢已确认',yellow:'🟡合理推断',grey:'🔴猜测',red:'🔴猜测'};
    let html=sigs.slice(0,5).map(s=>{
        let vn=s.verification_note||'',tq=s.three_questions||{};
        let q=(tq.variable||tq.what||'')+' | '+(tq.magnitude||tq.scale||'')+' | '+(tq.sustainability||tq.duration||'');
        return `<div class="highlight"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap"><span style="font-weight:600;font-size:11px">${s.title||s.id||'?'}</span><span class="mono" style="color:#8b949e;font-size:9px">${(s.chain||'').replace('chain1','链一').replace('chain2','链二')}</span><span style="font-size:9px;margin-left:auto;color:${s.confidence==='green'?'#3fb950':s.confidence==='yellow'?'#d29922':'#8b949e'}">${confMap[s.confidence]||s.confidence||''}</span></div><div style="font-size:10px;color:#c9d1d9">${vn}</div><div style="font-size:9px;color:#8b949e;margin-top:2px">${q}</div>${s.priced_in===false?'<div style="margin-top:2px;font-size:9px;color:#3fb950">💡 可能被低估</div>':''}</div>`}).join('');
    if(sigs.length>5)html+=`<div class="collapse-h" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.collapse-arrow').textContent=this.nextElementSibling.classList.contains('open')?'▼':'▶'"><span class="collapse-arrow">▶</span>更多 ${sigs.length-5} 条分析</div><div class="collapse-body">${sigs.slice(5).map(s=>{
        let vn=s.verification_note||'';
        return `<div class="highlight"><div style="font-size:11px;font-weight:600">${s.title||s.id||'?'}</div><div style="font-size:10px;color:#c9d1d9">${vn}</div></div>`}).join('')}</div>`;
    el('analystSignals').innerHTML=html||'<div class="empty">无Analyst分析</div>';
}
function renderB1B2B3(){
    if(!sdD){el('b1b2b3Signals').innerHTML='<div class="empty">无数据</div>';return}
    let b1=sdD.b1||[],b2d=sdD.b2||[],b2r=sdD.b2_raw||[],b3d=sdD.b3||[],b3r=sdD.b3_raw||[],ws=sdD.washout||[];
    let html='';
    if(b1.length)html+=`<div style="font-size:11px;font-weight:600;color:#3fb950;margin-bottom:2px">B1 超卖拐点 (${b1.length}只)</div>`+b1.slice(0,20).map(r=>`<div class="signal-row s-fire"><span class="badge b-fire">B1</span><span style="font-weight:600">${r[1]||'?'}</span><span class="mono blue">${r[0]||''}</span><span style="font-size:9px;color:#8b949e">${r[2]||''} ${r[4]||''} ${fmtPct(r[5])}</span></div>`).join('');
    if(b2d.length)html+=`<div style="font-size:11px;font-weight:600;color:#d29922;margin:6px 0 2px">B2 确认中阳 (${b2d.length}只)</div>`+b2d.slice(0,8).map(r=>`<div class="signal-row s-high"><span class="badge b-high">B2</span><span style="font-weight:600">${r.name||'?'}</span><span class="mono blue">${r.code||''}</span><span style="font-size:9px;color:#8b949e">${r.pattern||''} ${fmtPct(r.pct)}</span></div>`).join('');
    if(b3d.length)html+=`<div style="font-size:11px;font-weight:600;color:#58a6ff;margin:6px 0 2px">B3 一致确认 (${b3d.length}只)</div>`+b3d.slice(0,8).map(r=>`<div class="signal-row s-norm"><span class="badge b-info">B3</span><span style="font-weight:600">${r.name||'?'}</span><span class="mono blue">${r.code||''}</span></div>`).join('');
    if(ws.length)html+=`<div style="font-size:11px;font-weight:600;color:#c9d1d9;margin:6px 0 2px">🧹 洗盘 (${ws.length}只)</div>`+ws.slice(0,8).map(r=>`<div class="signal-row s-norm"><span style="font-weight:600">${r[1]||'?'}</span><span class="mono blue">${r[0]||''}</span></div>`).join('');
    el('b1b2b3Signals').innerHTML=html||'<div class="empty">无信号</div>';
}
function renderCross(){
    if(!sdD){el('crossSignals').innerHTML='<div class="empty">无数据</div>';return}
    let gd=sdD.golden||[],dh=sdD.death||[],html='';
    if(gd.length)html+=`<div style="font-size:11px;font-weight:600;color:#da3633;margin-bottom:2px">🟡 金叉 (${gd.length}只)</div>`+gd.slice(0,5).map(r=>`<div class="signal-row s-fire"><span style="font-weight:600">${r[1]||'?'}</span><span class="mono">${r[0]||''}</span><span style="font-size:9px;color:#8b949e">${r[2]||''} ${r[4]||''}</span></div>`).join('');
    if(dh.length)html+=`<div style="font-size:11px;font-weight:600;color:#3fb950;margin:6px 0 2px">💀 死叉 (${dh.length}只)</div>`+dh.slice(0,5).map(r=>`<div class="signal-row s-norm"><span style="font-weight:600">${r[1]||'?'}</span><span class="mono">${r[0]||''}</span><span style="font-size:9px;color:#8b949e">${r[2]||''} ${r[4]||''}</span></div>`).join('');
    el('crossSignals').innerHTML=html||'<div class="empty">无信号</div>';
}

// ════════════════ TAB: 大势 ════════════════
async function loadTrend(){
    try{let[rot,vol,theme,sector,alerts]=await Promise.all([L('data/tc-rotation.json').catch(()=>null),L('data/tc-volume.json').catch(()=>null),L('data/theme-data.json').catch(()=>null),L('data/sector-oversold-index.json').catch(()=>null),L('data/kdj-double-alert-lite.json').catch(()=>null)]);
    // KPIs
    let topRot=rot?.ranking?.[0],topN=topRot?topRot[0]:'-',topM5=topRot?topRot[1]?.momentum_5d:null;
    let scores=theme?.scores||[],hotS=scores[0],hotN=hotS?.name||'-',hotD1=hotS?.d1;
    let b1=(alerts?.l2_buy?.length||0)+(alerts?.l1_buy?.length||0);
    let vs=vol?.stats||{},surge=(vs.extreme_surge||0)+(vs.strong_surge||0);
    el('trendKPIs').innerHTML=KPI([{v:hotN,l:'热度最高',c:hotD1>0?'red':''},{v:topM5!=null?fmtPct(topM5):'-',l:'5日轮动('+topN+')'},{v:b1,l:'B1买点'},{v:surge,l:'放量异动',c:surge>5?'red':''},{v:theme?.crowding?.extended?.length||0,l:'拥挤方向'}]);
    // Rotation
    el('rotationDate').textContent=' '+(rot?.date||'');
    let rk=rot?.ranking||[],crowded=rot?.crowded||[];
    el('rotationRanking').innerHTML=rk.length?rk.map((r,i)=>{let nm=r[0],st=r[1]||{},dr=st.daily_return||0,m5=st.momentum_5d||0,m10=st.momentum_10d||0,up=st.up_ratio||0,volR=st.vol_ratio||0,isC=crowded.includes(nm);
    return`<div class="dir-row"><span class="dir-rank">${i+1}</span><span class="dir-name" title="${nm}">${nm}${isC?' ⚠️':''}</span><span class="mono" style="color:${dr>=0?'#da3633':'#3fb950'};min-width:50px;text-align:right">${fmtPct(dr)}</span><span class="mono" style="color:${m5>=0?'#da3633':'#3fb950'};min-width:55px;text-align:right">5日${fmtPct(m5)}</span><span class="mono" style="color:${m10>=0?'#da3633':'#3fb950'};min-width:58px;text-align:right">10日${fmtPct(m10)}</span><span style="min-width:36px;text-align:right;font-size:9px;color:#8b949e">↑${up.toFixed(0)}%</span></div>`}).join(''):'<div class="empty">无数据</div>';
    // Theme heat
    el('themeDate').textContent=' '+(theme?.date||'');
    let top12=scores.slice(0,12),maxS=Math.max(...top12.map(s=>s.score||0),1);
    el('dirHeat').innerHTML=top12.length?top12.map((s,i)=>{let p=s.score||0,w=p/maxS*100;return`<div class="dir-row"><span class="dir-rank">${i+1}</span><span class="dir-name" title="${s.name}">${s.name}</span><div style="flex:1;height:10px;background:#0d1117;border-radius:2px;overflow:hidden"><div style="width:${w}%;height:100%;background:${(s.d1||0)>=0?'#da3633':'#3fb950'};border-radius:2px"></div></div><span class="mono" style="color:${(s.d1||0)>=0?'#da3633':'#3fb950'};min-width:50px;text-align:right">${fmtPct(s.d1)}</span><span style="font-size:9px;color:#8b949e;min-width:32px;text-align:right">${s.stocks||0}只</span></div>`}).join(''):'<div class="empty">无数据</div>';
    // Volume stats
    let vl={bullish:'📈看涨',distribution:'📤派发',divergence:'🔄背离',pullback:'📉回调',extreme_surge:'🔥极度放量',strong_surge:'⚡强势放量'};
    el('volStats').innerHTML='<div style="display:flex;flex-wrap:wrap;gap:4px">'+Object.entries(vl).map(([k,v])=>{let c=vs[k]||0;if(c>0)return`<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(88,166,255,.05);color:#c9d1d9">${v} ${c}</span>`;return''}).join('')+'</div>';
    // Clusters
    let cl=alerts?.clusters||{},ent=Object.entries(cl).sort((a,b)=>b[1]-a[1]);
    el('trendClusters').innerHTML=ent.length?ent.map(([c,n])=>`<span class="cluster-badge" style="${n>=5?'background:rgba(248,81,73,.1);color:#f85149;border-color:rgba(248,81,73,.3)':''}">${c} ×${n}</span>`).join('')+'<div style="font-size:9px;color:#8b949e;margin-top:2px">≥3只同方向触发 = 板块级行为</div>':'<div class="empty">无集群</div>';
    // Sector KDJ
    el('kdjDate').textContent=' '+(sector?.week_date||sector?.week||'');
    let secs=sector?.sectors||[],ssort=[...secs].sort((a,b)=>(a.below15_pct||0)-(b.below15_pct||0));
    el('sectorKDJ').innerHTML=ssort.length?ssort.map(s=>{let b15=s.below15_pct||0;return`<tr><td>${s.category||'?'}</td><td style="text-align:right;color:#8b949e">${s.stock_count||0}</td><td style="text-align:right;font-family:monospace">${fmtN(s.avg_K)}</td><td style="text-align:right;font-family:monospace;color:${(s.avg_J||0)<20?'#3fb950':'#c9d1d9'}">${fmtN(s.avg_J)}</td><td style="text-align:right;color:${b15>30?'#3fb950':b15>15?'#d29922':'#c9d1d9'}">${b15.toFixed(0)}%</td><td style="text-align:right;font-size:9px;color:${s.status==='🔴超跌'?'#3fb950':s.status==='🟡偏弱'?'#d29922':'#8b949e'}">${s.status||'—'}</td></tr>`}).join(''):'<tr><td colspan="6" class="empty">无数据</td></tr>';
    }catch(e){console.log(e)}

// ════════════════ TAB: 报警 ════════════════
let alertD,chartCD;
async function loadAlerts(){
    try{if(!alertD)alertD=await L('data/kdj-double-alert-lite.json');let d=alertD,l2=d.l2_buy||[],l1=d.l1_buy||[],wt=d.wait_daily||[],sl=d.l1_sell||[],ms=d.missed||[],cl=Object.values(d.clusters||{}).filter(n=>n>=3).length;
    el('alertDate').textContent=d.week_date?' 周截止 '+d.week_date:'';
    el('alertKPIs').innerHTML=KPI([{v:l2.length,l:'🔴双超卖',c:l2.length?'red':''},{v:l1.length,l:'🟡一级',c:l1.length?'gold':''},{v:wt.length,l:'⏳等日线'},{v:cl,l:'🔥集群',c:cl?'gold':''},{v:sl.length,l:'🟢卖点',c:sl.length>100?'red':''},{v:ms.length,l:'⚠️错过'}]);
    let ce=Object.entries(d.clusters||{}).sort((a,b)=>b[1]-a[1]);
    el('alertClusters').innerHTML=ce.length?ce.map(([c,n])=>`<span class="cluster-badge" style="${n>=5?'background:rgba(248,81,73,.1);color:#f85149;border-color:rgba(248,81,73,.3)':''}">🔥 ${c} ×${n}</span>`).join(''):'';
    let allBuy=[...l2.map(s=>({...s,level:2})),...l1.map(s=>({...s,level:1}))];
    allBuy.sort((a,b)=>{let sa=(a.backtest_win_rate||0)*(a.backtest_avg_return||0)/100,sb=(b.backtest_win_rate||0)*(b.backtest_avg_return||0)/100;return sb-sa});
    el('alertPriority').innerHTML=allBuy.slice(0,15).length?allBuy.slice(0,15).map((s,i)=>renderAlertRow(s,i+1)).join(''):'<div class="empty">暂无买点</div>';
    el('alertFullList').innerHTML=renderAlertSec('🔴 双超卖 B1 (周J<0, 白>黄, 日J≤15)',l2,'a-l2','B1')+renderAlertSec('🟡 一级买点 (0≤周J<15, 白>黄, 日J≤15)',l1,'a-l1','B1')+renderAlertSec('⏳ 等日线',wt,'a-wait','⏳')+renderAlertSec('🟢 一级卖点',sl.slice(0,30),'a-sell','卖')+(ms.length?renderAlertSec('⚠️ 可能错过',ms,'a-miss','⚠️'):'');
    }catch(e){console.log(e)}
}
function renderAlertSec(title,sigs,cls,badge){return sigs.length?`<div class="section-title">${title} <span class="card-sub">(${sigs.length}只)</span></div>`+sigs.map(s=>renderAlertRow(s,null,cls,badge)).join(''):'';}
function renderAlertRow(s,rank,cls,badge){
    let wr=s.backtest_win_rate!=null?`<span class="green">${s.backtest_win_rate}%</span>`:'-',ar=s.backtest_avg_return!=null?`<span style="color:${s.backtest_avg_return>0?'#da3633':'#3fb950'}">${fmtPct(s.backtest_avg_return)}</span>`:'-';
    let dj=s.day_J!=null?s.day_J.toFixed(0):'-',score=(s.backtest_win_rate||0)*(s.backtest_avg_return||0)/100;
    let name=(s.name||'').replace(/'/g,'');
    return`<div class="a-card ${cls||''}" onclick="showChart('${s.ts_code}','${name}')">${rank?'<span style="color:#8b949e;font-size:9px;min-width:16px">#'+rank+'</span>':''}<span class="badge ${badge==='B1'?'b-fire':badge==='卖'?'b-high':'b-info'}">${badge||'?'}</span><span style="font-weight:600;min-width:60px">${s.name||''}</span><span class="mono blue" style="min-width:75px">${s.ts_code||''}</span><span style="color:#8b949e;font-size:9px;min-width:70px">${s.theme_category||''}</span><span class="mono">周J:${(s.week_J||0).toFixed(0)} 日J:${dj}</span><span>胜率:${wr} 均收:${ar}</span><span class="mono" style="color:#d29922">得分:${score.toFixed(0)}</span></div>`;
}

async function loadPortfolio(){

        let act='';if(dist!=null&&dist<0)act='<span class="pf-act sell">🔴 跌破黄线</span>';else if(pn!=null&&pn>20)act='<span class="pf-act profit">📈 +20% 可止盈</span>';else if(dist!=null&&dist<5)act='<span class="pf-act watch">⚠️ 接近黄线</span>';else if(pn!=null&&pn>0)act='<span class="pf-act hold">✅ 持仓观望</span>';else act='<span class="pf-act watch">⏳ 浮亏</span>';
        return`<div class="pf-card${isA?' alert':''}"><div class="pf-name">${p.name||'?'} <span class="pf-code">${p.code||'?'}</span></div><div class="pf-row"><div class="pf-ind"><div class="pf-ind-l">现价</div><div class="pf-ind-v">${cp||'-'}</div></div><div class="pf-ind"><div class="pf-ind-l">浮动</div><div class="pf-ind-v ${pn>=0?'pos':'neg'}">${pn!=null?fmtPct(pn):'-'}</div></div><div class="pf-ind"><div class="pf-ind-l">白线</div><div class="pf-ind-v mono">${wl||'-'}</div></div><div class="pf-ind"><div class="pf-ind-l">黄线</div><div class="pf-ind-v mono" style="color:#d29922">${yl||'-'}</div></div><div class="pf-ind"><div class="pf-ind-l">距黄线</div><div class="pf-ind-v ${dist>=0?'pos':'neg'}">${dist!=null?fmtPct(dist):'-'}</div></div></div>${act}${(p.alerts||[]).length?`<div style="font-size:9px;color:#f85149;margin-top:4px">🔔 ${p.alerts.map(a=>a.title||a.msg||'').join(' | ')}</div>`:''}</div>`}).join(''):'<div class="empty">无持仓数据</div>';
    }catch(e){console.log(e)}

// ════════════════ KDJ Chart ════════════════
async function showChart(code,name){
    el('chartModal').classList.add('active');el('chartTitle').textContent='📈 '+name+'  '+code;
    let body=el('chartBody');body.innerHTML='<div class="empty">⏳</div>';
    try{if(!chartCD)chartCD=await L('data/kdj-chart-data.json');let ch=(chartCD||{})[code];if(!ch||!ch.weeks||ch.weeks.length<5){body.innerHTML='<div class="empty">图表数据不足</div>';return}
    let w=ch.weeks.slice(-80),k=ch.kdj?ch.kdj.slice(-80):[],fv=0;
    for(let i=0;i<Math.min(w.length,k.length);i++){if(k[i]&&k[i].white!=null&&k[i].yellow!=null){fv=i;break}}
    w=w.slice(fv).slice(-52);k=k.slice(fv).slice(-52);let n=w.length,box=body.getBoundingClientRect();
    let W=Math.max(700,box.width-20),H=Math.max(500,window.innerHeight*.7),ratio=.62,H1=Math.floor(H*ratio),H2=H-H1-24;
    let pL=60,pR=30,pT=15,pB=28,xR=W-pL-pR;
    let allP=w.flatMap(x=>[x.h,x.l]),bbV=k.filter(x=>x&&x.yellow!=null).map(x=>x.yellow),whV=k.filter(x=>x&&x.white!=null).map(x=>x.white),bsV=k.filter(x=>x&&x.bbi_std!=null&&x.bbi_std!==x.yellow).map(x=>x.bbi_std);
    let allV=[...allP,...bbV,...whV,...bsV].filter(v=>v!=null&&isFinite(v));if(!allV.length)return;
    let minP=Math.min(...allV)*.97,maxP=Math.max(...allV)*1.03,pRng=(maxP-minP)||1,yR=H1-pT-5;
    function px(i){return pL+i*xR/Math.max(1,n-1)}function py(v){return pT+(maxP-v)/pRng*yR}
    let allK=k.filter(x=>x).flatMap(x=>[x.K,x.D,x.J]).filter(v=>v!=null),minK=allK.length?Math.min(...allK,-10):-20,maxK=allK.length?Math.max(...allK,110):120,kRng=(maxK-minK)||1,y2R=H2-pB-5,y2B=H1+24;
    function py2(v){return y2B+pT+(maxK-v)/kRng*y2R}
    body.innerHTML='';let cv=document.createElement('canvas');cv.width=W;cv.height=H;cv.style.display='block';cv.style.margin='0 auto';body.appendChild(cv);
    let ctx=cv.getContext('2d');ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    // Grid
    ctx.strokeStyle='#1a1f2b';ctx.lineWidth=.5;
    for(let i=0;i<=4;i++){let y=pT+i*yR/4;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke()}
    ctx.strokeStyle='#30363d';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pL,H1+12);ctx.lineTo(W-pR,H1+12);ctx.stroke();
    // BBI std (only if different from yellow)
    let hasBbi=bsV.length>0;
    if(hasBbi){ctx.strokeStyle='#6e7681';ctx.lineWidth=1.2;ctx.setLineDash([2,4]);ctx.beginPath();let st=false;for(let i=0;i<n;i++){if(k[i]&&k[i].bbi_std!=null&&k[i].bbi_std!==k[i].yellow){let x=px(i),y=py(k[i].bbi_std);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke();ctx.setLineDash([])}
    // 黄线
    ctx.strokeStyle='#d29922';ctx.lineWidth=1.8;ctx.setLineDash([5,3]);ctx.beginPath();let st=false;for(let i=0;i<n;i++){if(k[i]&&k[i].yellow!=null){let x=px(i),y=py(k[i].yellow);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke();ctx.setLineDash([]);
    // 白线
    ctx.strokeStyle='#f0f6fc';ctx.lineWidth=1.5;ctx.beginPath();st=false;for(let i=0;i<n;i++){if(k[i]&&k[i].white!=null){let x=px(i),y=py(k[i].white);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke();
    // Candles
    let bw=Math.min(6,Math.max(1.5,xR/n*.35));
    w.forEach((cd,i)=>{let x=px(i),o=py(cd.o),c=py(cd.c),h=py(cd.h),l=py(cd.l),up=cd.c>=cd.o;ctx.strokeStyle=up?'#da3633':'#3fb950';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x,h);ctx.lineTo(x,l);ctx.stroke();let bh=Math.max(.5,Math.abs(o-c));ctx.fillStyle=up?'#da3633':'#3fb950';ctx.fillRect(x-bw/2,Math.min(o,c),bw,bh)});
    // Price labels
    ctx.fillStyle='#8b949e';ctx.font='9px monospace';ctx.textAlign='right';for(let i=0;i<=4;i++){let v=minP+i*pRng/4;ctx.fillText(v.toFixed(v>=100?0:2),pL-4,py(v)+3)}
    // Week labels
    ctx.textAlign='center';ctx.font='8px monospace';ctx.fillStyle='#484f58';for(let i=0;i<n;i++){if(i%Math.max(1,Math.floor(n/8))===0||i===n-1)ctx.fillText(w[i].d.slice(4),px(i),H1+18)}
    // KDJ
    ctx.strokeStyle='#1a1f2b';ctx.lineWidth=.5;[0,20,50,80,100].forEach(vv=>{let y=py2(vv);ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke()});
    [{k:'K',c:'#8b949e'},{k:'D',c:'#d29922'},{k:'J',c:'#58a6ff'}].forEach(cf=>{ctx.strokeStyle=cf.c;ctx.lineWidth=1;ctx.beginPath();st=false;for(let i=0;i<n;i++){if(k[i]&&k[i][cf.k]!=null){let x=px(i),y=py2(k[i][cf.k]);if(!st){ctx.moveTo(x,y);st=true}else ctx.lineTo(x,y)}}ctx.stroke()});
    ctx.fillStyle='#484f58';ctx.textAlign='right';ctx.font='8px monospace';[0,50,100].forEach(vv=>ctx.fillText(vv,pL-4,py2(vv)+3));
    // Legend
    ctx.font='10px sans-serif';let lx=pL+8,ly=pT+14;
    let legend=[['━━ 白线 EMA','#f0f6fc'],['┅┅ 黄线 BBI','#d29922']];
    if(hasBbi)legend.splice(1,0,['┅┅ BBI标','#6e7681']);
    legend.forEach(([t,c],i)=>{ctx.fillStyle=c;ctx.textAlign='left';ctx.fillText(t,lx+i*120,ly)});
    [['━ K','#8b949e'],['━ D','#d29922'],['━ J','#58a6ff']].forEach(([t,c],i)=>{ctx.fillStyle=c;ctx.textAlign='left';ctx.fillText(t,lx+i*70,y2B+pT+12)});
    }catch(e){body.innerHTML='<div class="empty">渲染失败</div>';console.log(e)}
}
function closeChart(){el('chartModal').classList.remove('active')}
</script>
